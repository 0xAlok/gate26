<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GATE 2027 Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e10;--bg2:#141416;--bg3:#1a1a1d;--bg4:#222226;--border:#2a2a2e;--border2:#333338;--text:#e8e8ea;--text2:#9a9aab;--text3:#5a5a6a;--amber:#f59e0b;--amber2:#d97706;--amber-dim:rgba(245,158,11,0.12);--amber-dim2:rgba(245,158,11,0.06);--green:#10b981;--green-dim:rgba(16,185,129,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.1);--blue:#3b82f6;--radius:6px}
html.light{--bg:#f4f3ef;--bg2:#eceae4;--bg3:#e4e2da;--bg4:#dddbd2;--border:#d0cec5;--border2:#bfbdb3;--text:#1a1a1e;--text2:#5a5a6a;--text3:#9a9aab;--amber-dim:rgba(245,158,11,0.1);--amber-dim2:rgba(245,158,11,0.05);--green-dim:rgba(16,185,129,0.1);--red-dim:rgba(239,68,68,0.07)}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:50}
.header-title{font-family:'Instrument Serif',serif;font-size:1rem;color:var(--text);letter-spacing:-0.01em;flex-shrink:0}
.header-title span{color:var(--amber)}
.stream-toggle,.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0}
.stream-btn,.view-btn{padding:3px 10px;font-size:0.7rem;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:transparent;transition:all .15s;font-family:'IBM Plex Mono',monospace}
.stream-btn.active{background:var(--amber);color:#0e0e10}
.view-btn.active{background:var(--bg4);color:var(--text)}
.countdown-chip{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius);padding:2px 8px;flex-shrink:0}
.header-spacer{flex:1}
.icon-btn{height:26px;padding:0 8px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:0.68rem;font-weight:600;transition:all .15s;flex-shrink:0;gap:4px;font-family:'DM Sans',sans-serif}
.icon-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.panels{display:grid;grid-template-columns:290px 1fr 230px;flex:1;overflow:hidden;min-height:0}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;min-height:0}
.panel:last-child{border-right:none}
.panel-header{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
.panel-title{font-size:0.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.panel-body{flex:1;overflow-y:auto;padding:10px 12px;min-height:0}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.stat-chip{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 9px}
.stat-label{font-size:0.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:.95rem;font-weight:600;color:var(--text);line-height:1}
.stat-value.amber{color:var(--amber)}.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}
.date-nav{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.nav-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:.8rem;transition:all .1s}
.nav-btn:hover{border-color:var(--amber);color:var(--amber)}
.nav-today{height:22px;padding:0 6px;font-size:0.6rem;display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);transition:all .1s;font-family:'DM Sans',sans-serif}
.nav-today:hover{border-color:var(--amber);color:var(--amber)}
.date-label{flex:1;text-align:center;font-size:.78rem;font-weight:500;color:var(--text)}
.cat-selector{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.cat-pill{padding:2px 7px;border-radius:99px;font-size:.62rem;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .1s;white-space:nowrap}
.cat-pill.active{border-color:rgba(255,255,255,.5)!important}
.cat-pill.clear-pill{background:var(--bg4);color:var(--text2);border-color:var(--border)}
.cat-pill.clear-pill.active{border-color:var(--text2)}
.time-sections{display:flex;flex-direction:column;gap:5px}
.time-section-label{font-size:.6rem;color:var(--text3);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:5px}
.time-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.time-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px}
.time-block{aspect-ratio:1.3/1;border-radius:3px;background:var(--bg4);cursor:pointer;transition:transform .08s;position:relative}
.time-block:hover{transform:scale(1.18);z-index:5}
.time-block.has-note::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:2px;height:2px;background:rgba(255,255,255,.7);border-radius:50%}
.topic-input-row{display:flex;gap:5px;margin-top:8px;margin-bottom:6px}
.topic-input,.search-input,.refl-input,.modal-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;color:var(--text);font-size:.73rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.topic-input{flex:1}.search-input{flex:1}
.topic-input:focus,.search-input:focus,.refl-input:focus,.modal-input:focus{border-color:var(--amber)}
.topic-input::placeholder,.search-input::placeholder,.refl-input::placeholder,.modal-input::placeholder{color:var(--text3)}
.refl-input{width:100%;resize:none;min-height:40px}
.topic-add-btn{padding:5px 9px;background:var(--amber-dim);border:1px solid rgba(245,158,11,.25);color:var(--amber);border-radius:var(--radius);cursor:pointer;font-size:.75rem;font-weight:500;transition:all .1s}
.topic-add-btn:hover{background:var(--amber);color:#0e0e10}
.topic-tags{display:flex;flex-wrap:wrap;gap:3px}
.topic-tag{display:flex;align-items:center;gap:3px;padding:2px 6px;background:var(--amber-dim);border:1px solid rgba(245,158,11,.15);border-radius:99px;font-size:.62rem;color:var(--amber)}
.topic-tag-del{cursor:pointer;opacity:.6;line-height:1;font-size:.8rem}
.topic-tag-del:hover{opacity:1}
.reflection-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:8px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);font-size:.68rem;color:var(--text2);transition:all .1s}
.reflection-toggle:hover{border-color:var(--border2);color:var(--text)}
.reflection-toggle .chevron{transition:transform .2s;margin-left:auto}
.reflection-toggle.open .chevron{transform:rotate(180deg)}
.reflection-body{display:none;flex-direction:column;gap:7px;margin-top:6px;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius)}
.reflection-body.open{display:flex}
.refl-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.star-row{display:flex;gap:3px;margin-top:1px}
.star{cursor:pointer;font-size:.95rem;color:var(--text3);transition:color .1s}
.star.filled{color:var(--amber)}
.action-bar{display:flex;gap:3px;padding:7px 12px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.action-btn{padding:3px 7px;font-size:.62rem;font-weight:500;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .1s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.action-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.action-btn.danger:hover{border-color:var(--red);color:var(--red)}
.subject-tabs{display:flex;gap:3px;overflow-x:auto;padding:6px 12px;border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.subject-tabs::-webkit-scrollbar{display:none}
.subject-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:all .1s;flex-shrink:0;min-width:52px}
.subject-tab:hover{background:var(--bg3);border-color:var(--border)}
.subject-tab.active{background:var(--amber-dim);border-color:rgba(245,158,11,.3)}
.subject-tab-name{font-size:.6rem;font-weight:500;color:var(--text2);text-align:center;line-height:1.2}
.subject-tab.active .subject-tab-name{color:var(--amber)}
.subject-tab-pct{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--text3)}
.subject-tab.active .subject-tab-pct{color:var(--amber2)}
.tab-ring{width:26px;height:26px}
.tab-ring svg{transform:rotate(-90deg)}
.tab-ring-bg{fill:none;stroke:var(--bg4);stroke-width:3}
.tab-ring-fill{fill:none;stroke:var(--amber);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .4s}
.subject-progress-bar{height:2px;background:var(--bg4);margin:0 12px 0;flex-shrink:0}
.subject-progress-fill{height:100%;background:var(--amber);transition:width .3s}
.subject-stat-row{display:flex;gap:10px;padding:4px 12px 6px;flex-shrink:0;border-bottom:1px solid var(--border)}
.subj-stat{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--text2)}
.subj-stat span{color:var(--amber);font-weight:600}
.filter-row{display:flex;gap:3px;padding:5px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-chip{padding:2px 7px;border-radius:99px;font-size:.6rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .1s;font-family:'DM Sans',sans-serif}
.filter-chip.active{background:var(--amber-dim);border-color:rgba(245,158,11,.3);color:var(--amber)}
.syllabus-search-row{padding:5px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.topic-section-header{padding:7px 0 3px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);border-bottom:1px solid var(--border);margin-bottom:1px}
.topic-row{display:flex;align-items:center;gap:7px;padding:4px 3px;border-radius:4px;transition:background .1s}
.topic-row:hover{background:var(--bg3)}
.topic-name{flex:1;font-size:.72rem;color:var(--text);line-height:1.3}
.topic-name.done{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}
.topic-check{width:15px;height:15px;border:1.5px solid var(--border2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s;background:transparent}
.topic-check:hover{border-color:var(--amber)}
.topic-check.checked{background:var(--amber);border-color:var(--amber)}
.topic-check.checked::after{content:'✓';font-size:.55rem;color:#0e0e10;font-weight:700}
.topic-check.revised:hover{border-color:var(--green)}
.topic-check.revised.checked{background:var(--green);border-color:var(--green)}
.topic-check.notes-check.checked{background:var(--bg4);border-color:var(--blue)}
.topic-check.notes-check.checked::after{content:'n';font-size:.55rem;color:var(--blue);font-weight:700}
.check-label{font-size:.52rem;color:var(--text3);text-align:center;line-height:1}
.topic-checks-group{display:flex;gap:5px;align-items:center}
.check-col{display:flex;flex-direction:column;align-items:center;gap:1px}
.empty-state{display:flex;align-items:center;justify-content:center;padding:28px 16px;color:var(--text3);font-size:.72rem;text-align:center}
.legend{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0 0}
.legend-item{display:flex;align-items:center;gap:3px;font-size:.58rem;color:var(--text3)}
.legend-dot{width:7px;height:7px;border-radius:2px}
.insights-panel{background:var(--bg2)}
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.week-day{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 2px;border-radius:4px;cursor:pointer;transition:background .1s;position:relative;overflow:hidden}
.week-day:hover{background:var(--bg3)}
.week-day.today{outline:1px solid var(--amber)}
.week-day.selected{background:var(--amber-dim)}
.week-day-fill{position:absolute;bottom:0;left:0;right:0;background:var(--amber-dim);transition:height .3s}
.week-day-name{font-size:.55rem;color:var(--text3);position:relative;z-index:1}
.week-day-num{font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:600;color:var(--text);position:relative;z-index:1}
.week-day-hours{font-size:.55rem;color:var(--text3);position:relative;z-index:1;font-family:'IBM Plex Mono',monospace}
.week-day-hours.has-study{color:var(--amber)}
.overall-summary{padding:9px 12px;background:var(--amber-dim2);border-bottom:1px solid var(--border);flex-shrink:0}
.overall-pct{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--amber);line-height:1}
.overall-label{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.overall-meta{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.overall-meta-row{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text2)}
.overall-meta-row strong{font-family:'IBM Plex Mono',monospace;color:var(--text);font-weight:500}
.subject-card{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.subject-card:hover{background:var(--bg3)}
.subject-card.active{background:var(--amber-dim2);border-left-color:var(--amber)}
.subject-card-name{font-size:.72rem;font-weight:500;color:var(--text);margin-bottom:3px}
.subject-card-bar{height:2px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-bottom:3px}
.subject-card-fill{height:100%;border-radius:99px;transition:width .3s}
.subject-card-meta{display:flex;justify-content:space-between;align-items:center}
.subject-card-nums{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--text3)}
.status-badge{font-size:.55rem;font-weight:600;padding:1px 5px;border-radius:99px;letter-spacing:.04em}
.status-not-started{background:var(--bg4);color:var(--text3)}
.status-in-progress{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.status-needs-revision{background:var(--red-dim);color:var(--red)}
.status-strong{background:var(--green-dim);color:var(--green)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:5px 12px;font-size:.7rem;color:var(--text);opacity:0;transition:all .2s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cat-deep-work{background:#1a4731!important}.cat-revision{background:#14532d!important}.cat-practice{background:#166534!important}.cat-break{background:#78350f!important}.cat-distraction{background:#7f1d1d!important}.cat-exercise{background:#1e3a8a!important}.cat-meals{background:#7c3626!important}.cat-sleep{background:#3b0764!important}.cat-other{background:#292524!important}
html.light .cat-deep-work{background:#bbf7d0!important}html.light .cat-revision{background:#86efac!important}html.light .cat-practice{background:#4ade80!important}html.light .cat-break{background:#fde68a!important}html.light .cat-distraction{background:#fca5a5!important}html.light .cat-exercise{background:#bfdbfe!important}html.light .cat-meals{background:#fed7aa!important}html.light .cat-sleep{background:#ddd6fe!important}html.light .cat-other{background:#d1d5db!important}
.cpill-deep-work{background:#2d6a4f;color:white}.cpill-revision{background:#1a7a42;color:white}.cpill-practice{background:#2a8a50;color:white}.cpill-break{background:#b45309;color:white}.cpill-distraction{background:#b91c1c;color:white}.cpill-exercise{background:#1d4ed8;color:white}.cpill-meals{background:#c2410c;color:white}.cpill-sleep{background:#7c3aed;color:white}.cpill-other{background:#57534e;color:white}
.search-match{background:var(--amber-dim);border-radius:2px}
#fileInput{display:none}
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-size:.58rem;padding:2px 5px;border-radius:3px;white-space:nowrap;pointer-events:none;z-index:99;font-family:'IBM Plex Mono',monospace}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:16px;width:290px;display:flex;flex-direction:column;gap:9px}
.modal-title{font-size:.78rem;font-weight:600;color:var(--text)}
.modal-subtitle{font-size:.65rem;color:var(--text3)}
.modal-actions{display:flex;gap:5px;justify-content:flex-end}
.modal-btn{padding:4px 10px;border-radius:var(--radius);font-size:.7rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .1s;font-family:'DM Sans',sans-serif}
.modal-btn.primary{background:var(--amber);color:#0e0e10;border-color:var(--amber)}
.modal-btn:hover{background:var(--bg4)}.modal-btn.primary:hover{background:var(--amber2)}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="header-title">GATE <span>2027</span></div>
  <div class="stream-toggle">
    <button class="stream-btn active" id="btn-cse" onclick="switchStream('CSE')">CSE</button>
    <button class="stream-btn" id="btn-da" onclick="switchStream('DA')">DA</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="view-both" onclick="setView('both')">Both</button>
    <button class="view-btn" id="view-time" onclick="setView('time')">Time</button>
    <button class="view-btn" id="view-syllabus" onclick="setView('syllabus')">Syllabus</button>
  </div>
  <div class="countdown-chip" id="countdown">— days</div>
  <div class="header-spacer"></div>
  <button class="icon-btn" onclick="toggleTheme()">◑ Theme</button>
  <button class="icon-btn" onclick="exportData()">↑ Export</button>
  <button class="icon-btn" onclick="document.getElementById('fileInput').click()">↓ Import</button>
  <input type="file" id="fileInput" accept=".json" onchange="importData(event)"/>
</header>

<div class="panels" id="panels">
  <!-- PANEL 1: TIME -->
  <div class="panel" id="panel-time">
    <div class="panel-header"><div class="panel-title">Today's Log</div></div>
    <div style="padding:10px 12px 0">
      <div class="date-nav">
        <button class="nav-btn" onclick="prevDay()">‹</button>
        <div class="date-label" id="date-label">—</div>
        <button class="nav-btn" onclick="nextDay()">›</button>
        <button class="nav-today" onclick="goToday()">today</button>
      </div>
      <div class="stat-row">
        <div class="stat-chip"><div class="stat-label">Deep Work</div><div class="stat-value green" id="stat-dw">0h</div></div>
        <div class="stat-chip"><div class="stat-label">Total Study</div><div class="stat-value amber" id="stat-study">0h</div></div>
        <div class="stat-chip"><div class="stat-label">Distraction</div><div class="stat-value red" id="stat-dist">0h</div></div>
        <div class="stat-chip"><div class="stat-label">Logged</div><div class="stat-value" id="stat-logged">0/48</div></div>
      </div>
      <div class="cat-selector" id="cat-selector"></div>
    </div>
    <div class="panel-body">
      <div class="time-sections" id="time-sections"></div>
      <div class="legend" id="legend"></div>
      <div style="margin-top:8px">
        <div class="panel-title" style="margin-bottom:5px">Topics Studied</div>
        <div class="topic-input-row">
          <input class="topic-input" id="topic-input" placeholder="Add topic… (Enter)" onkeydown="topicKeydown(event)"/>
          <button class="topic-add-btn" onclick="addTopic()">+</button>
        </div>
        <div class="topic-tags" id="topic-tags"></div>
      </div>
      <div class="reflection-toggle" id="refl-toggle" onclick="toggleReflection()">

function renderCatSelector(){
  document.getElementById('cat-selector').innerHTML=
    CATEGORIES.map(c=>`<div class="cat-pill cpill-${c.id}${selectedCat===c.id?' active':''}" onclick="selectCat('${c.id}')" title="[${c.key}] ${c.label}">${c.label}</div>`).join('')+
    `<div class="cat-pill clear-pill${selectedCat===null?' active':''}" onclick="selectCat(null)" title="[X] Clear">✕ Clear</div>`;
}

function selectCat(id){selectedCat=id;renderCatSelector();}

function renderTimeGrid(){
  const blocks=getBlocks();
  const el=document.getElementById('time-sections');
  el.innerHTML='';
  SECTION_LABELS.forEach(sec=>{
    const wrap=document.createElement('div');
    const lbl=document.createElement('div');lbl.className='time-section-label';lbl.textContent=sec.label;wrap.appendChild(lbl);
    const grid=document.createElement('div');grid.className='time-grid';
    for(let i=sec.start;i<sec.start+sec.count;i++){
      const b=blocks[i];
      const div=document.createElement('div');
      div.className='time-block'+(b?.cat?' cat-'+b.cat:'')+(b?.note?' has-note':'');
      div.setAttribute('data-tip',blockTime(i));
      div.onclick=()=>blockClick(i);
      div.oncontextmenu=e=>{e.preventDefault();blockRightClick(i);};
      grid.appendChild(div);
    }
    wrap.appendChild(grid);el.appendChild(wrap);
  });
}

function blockClick(idx){
  const blocks=getBlocks();
  pushUndo();
  if(selectedCat===null){if(blocks[idx]?.cat){blocks[idx]=null;saveBlocks(blocks);renderTime();}else{undoStack.pop();}return;}
  blocks[idx]=blocks[idx]?.cat===selectedCat?null:{cat:selectedCat,note:blocks[idx]?.note||''};
  saveBlocks(blocks);renderTime();
}

function blockRightClick(idx){
  const blocks=getBlocks();if(!blocks[idx]?.cat)return;
  modalBlockIdx=idx;
  document.getElementById('modal-block-time').textContent=blockTime(idx)+' — '+(CATEGORIES.find(c=>c.id===blocks[idx].cat)?.label||'');
  document.getElementById('modal-note-input').value=blocks[idx]?.note||'';
  document.getElementById('note-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-note-input').focus(),50);
}

function closeModal(){document.getElementById('note-modal').classList.remove('open');modalBlockIdx=null;}
function saveModal(){
  if(modalBlockIdx===null)return;
  const blocks=getBlocks();
  if(blocks[modalBlockIdx])blocks[modalBlockIdx].note=document.getElementById('modal-note-input').value;
  saveBlocks(blocks);renderTime();closeModal();
}

function fillSleep(){pushUndo();const b=getBlocks();SLEEP_BLOCKS.forEach(i=>{if(!b[i]?.cat)b[i]={cat:'sleep',note:''};});saveBlocks(b);renderTime();toast('Sleep filled');}
function clearDay(){if(!confirm('Clear all blocks?'))return;pushUndo();saveBlocks(Array(BLOCKS).fill(null));renderTime();toast('Day cleared');}

function updateStats(){
  const blocks=getBlocks();let dw=0,study=0,dist=0,logged=0;
  blocks.forEach(b=>{if(!b?.cat)return;logged++;if(b.cat==='deep-work')dw++;if(STUDY_CATS.has(b.cat))study++;if(b.cat==='distraction')dist++;});
  const toH=n=>{const h=(n*BLOCK_MIN)/60;return h%1===0?`${h}h`:`${h.toFixed(1)}h`;};
  document.getElementById('stat-dw').textContent=toH(dw);
  document.getElementById('stat-study').textContent=toH(study);
  document.getElementById('stat-dist').textContent=toH(dist);
  document.getElementById('stat-logged').textContent=`${logged}/48`;
}

function renderLegend(){
  document.getElementById('legend').innerHTML=CATEGORIES.map(c=>`<div class="legend-item"><div class="legend-dot cpill-${c.id}"></div>${c.label}</div>`).join('')+`<div class="legend-item">• = note</div>`;
}

// ── TOPICS (today panel) ───────────────────────────────────────────────────────
function renderTopicTags(){
  document.getElementById('topic-tags').innerHTML=getTopics().map((t,i)=>`<div class="topic-tag">${t}<span class="topic-tag-del" onclick="removeTopic(${i})">×</span></div>`).join('');
}
function topicKeydown(e){if(e.key==='Enter')addTopic();}
function addTopic(){const inp=document.getElementById('topic-input');const v=inp.value.trim();if(!v)return;const t=getTopics();t.push(v);saveTopics(t);inp.value='';renderTopicTags();}
function removeTopic(i){const t=getTopics();t.splice(i,1);saveTopics(t);renderTopicTags();}

// ── REFLECTION ─────────────────────────────────────────────────────────────────
function toggleReflection(){reflectionOpen=!reflectionOpen;document.getElementById('refl-toggle').classList.toggle('open',reflectionOpen);document.getElementById('refl-body').classList.toggle('open',reflectionOpen);}
function renderReflection(){const r=getRefl();document.getElementById('refl-good').value=r.good||'';document.getElementById('refl-better').value=r.better||'';document.getElementById('refl-tomorrow').value=r.tomorrow||'';renderStars(r.rating);}
function autoSaveRefl(){const r=getRefl();r.good=document.getElementById('refl-good').value;r.better=document.getElementById('refl-better').value;r.tomorrow=document.getElementById('refl-tomorrow').value;saveRefl(r);}
function renderStars(rating){document.getElementById('star-row').innerHTML=[1,2,3,4,5].map(n=>`<div class="star${n<=rating?' filled':''}" onclick="setRating(${n})">★</div>`).join('');}
function setRating(n){const r=getRefl();r.rating=n;saveRefl(r);renderStars(n);}

function renderTime(){renderCatSelector();renderTimeGrid();updateStats();renderTopicTags();renderReflection();renderLegend();}

// ── DATE NAV ───────────────────────────────────────────────────────────────────
function prevDay(){currentDate.setDate(currentDate.getDate()-1);renderAll();}
function nextDay(){currentDate.setDate(currentDate.getDate()+1);renderAll();}
function goToday(){currentDate=new Date();renderAll();toast('Today');}
function renderDateLabel(){document.getElementById('date-label').textContent=currentDate.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}

// ── SYLLABUS ───────────────────────────────────────────────────────────────────
const getSyllabus=()=>SYLLABUS[stream]||{};
const getSubjects=()=>Object.keys(getSyllabus());

function getSubjectStats(subj){
  const syll=getSyllabus()[subj]||{};let total=0,done=0,revised=0;
  Object.keys(syll).forEach(sect=>{syll[sect].forEach((_,idx)=>{total++;const st=getTopicState(subj,sect,idx);if(st.done)done++;if(st.revised)revised++;});});
  return{total,done,revised};
}

function getStatus({total,done,revised}){
  if(!total||!done)return'not-started';
  const dp=done/total;
  if(dp<0.7)return'in-progress';
  if(revised/Math.max(done,1)<0.3)return'needs-revision';
  return'strong';
}

const STATUS_LABEL={'not-started':'Not Started','in-progress':'In Progress','needs-revision':'Needs Revision','strong':'Strong'};
const STATUS_COLOR={'not-started':'var(--text3)','in-progress':'var(--amber)','needs-revision':'var(--red)','strong':'var(--green)'};

function renderSubjectTabs(){
  const subjects=getSubjects();
  if(!selectedSubject||!subjects.includes(selectedSubject))selectedSubject=subjects[0];
  const C=2*Math.PI*11;
  document.getElementById('subject-tabs').innerHTML=subjects.map(s=>{
    const st=getSubjectStats(s);const pct=st.total?Math.round((st.done/st.total)*100):0;
    const offset=C-(pct/100)*C;
    return`<div class="subject-tab${s===selectedSubject?' active':''}" onclick="selectSubject('${s}')">
      <svg class="tab-ring" viewBox="0 0 26 26"><circle class="tab-ring-bg" cx="13" cy="13" r="11"/><circle class="tab-ring-fill" cx="13" cy="13" r="11" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/></svg>
      <div class="subject-tab-name">${s}</div>
      <div class="subject-tab-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function selectSubject(s){selectedSubject=s;renderSyllabus();renderInsights();}

function setFilter(f){
  filterMode=f;
  ['all','undone','done','unrevised'].forEach(id=>{document.getElementById('f-'+id).className='filter-chip'+(f===id?' active':'');});
  renderTopics();
}

function renderSubjectStats(){
  const st=getSubjectStats(selectedSubject);
  const pct=st.total?Math.round((st.done/st.total)*100):0;
  document.getElementById('subject-prog-fill').style.width=pct+'%';
  document.getElementById('s-done').textContent=st.done;
  document.getElementById('s-revised').textContent=st.revised;
  document.getElementById('s-total').textContent=st.total;
  const subjs=getSubjects();let tot=0,dn=0;
  subjs.forEach(s=>{const ss=getSubjectStats(s);tot+=ss.total;dn+=ss.done;});
  const ovPct=tot?Math.round((dn/tot)*100):0;
  document.getElementById('syllabus-overall-chip').textContent=`${dn}/${tot} (${ovPct}%)`;
}

function renderTopics(){
  const syll=getSyllabus()[selectedSubject]||{};
  const search=document.getElementById('search-input').value.toLowerCase().trim();
  const el=document.getElementById('topics-panel');el.innerHTML='';
  Object.keys(syll).forEach(sect=>{
    const matched=syll[sect].map((topic,idx)=>{
      const st=getTopicState(selectedSubject,sect,idx);
      if(filterMode==='done'&&!st.done)return null;
      if(filterMode==='undone'&&st.done)return null;
      if(filterMode==='unrevised'&&st.revised)return null;
      if(search&&!topic.toLowerCase().includes(search))return null;
      return{topic,idx,st};
    }).filter(Boolean);
    if(!matched.length)return;
    const h=document.createElement('div');h.className='topic-section-header';h.textContent=sect;el.appendChild(h);
    matched.forEach(({topic,idx,st})=>{
      const row=document.createElement('div');row.className='topic-row';
      const name=document.createElement('div');name.className='topic-name'+(st.done?' done':'');
      if(search){const lo=topic.toLowerCase(),si=lo.indexOf(search);if(si>=0){name.innerHTML=topic.slice(0,si)+`<span class="search-match">${topic.slice(si,si+search.length)}</span>`+topic.slice(si+search.length);}else name.textContent=topic;}
      else name.textContent=topic;
      const checks=document.createElement('div');checks.className='topic-checks-group';
      ['done','revised','notes'].forEach(field=>{
        const col=document.createElement('div');col.className='check-col';
        const chk=document.createElement('div');chk.className=`topic-check${field==='revised'?' revised':field==='notes'?' notes-check':''}${st[field]?' checked':''}`;
        chk.onclick=()=>{setTopicState(selectedSubject,sect,idx,field,!st[field]);renderSyllabus();renderInsights();};
        const lbl=document.createElement('div');lbl.className='check-label';lbl.textContent=field==='done'?'done':field==='revised'?'rev':'note';
        col.appendChild(chk);col.appendChild(lbl);checks.appendChild(col);
      });
      row.appendChild(name);row.appendChild(checks);el.appendChild(row);
    });
  });
  if(!el.children.length)el.innerHTML='<div class="empty-state">No topics match filter.</div>';
}

function renderSyllabus(){renderSubjectTabs();renderSubjectStats();renderTopics();}

// ── INSIGHTS ───────────────────────────────────────────────────────────────────
function renderInsights(){renderWeekStrip();renderOverallSummary();renderSubjectCards();}

function renderWeekStrip(){
  const el=document.getElementById('week-strip');
  const weekStart=new Date(currentDate);weekStart.setDate(weekStart.getDate()-weekStart.getDay());
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];el.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);d.setDate(d.getDate()+i);
    const key=fmtDate(d);const isToday=key===todayStr();const isSel=key===fmtDate(currentDate);
    const blocks=loadKey(`g27_blocks_${key}_${stream}`,Array(BLOCKS).fill(null));
    let study=0;blocks.forEach(b=>{if(b?.cat&&STUDY_CATS.has(b.cat))study++;});
    const hrs=(study*BLOCK_MIN)/60;const fillPct=Math.min(100,(hrs/10)*100);
    const div=document.createElement('div');
    div.className='week-day'+(isToday?' today':'')+(isSel?' selected':'');
    div.onclick=()=>{currentDate=new Date(d);renderAll();};
    div.innerHTML=`<div class="week-day-fill" style="height:${fillPct}%"></div><div class="week-day-name">${days[i]}</div><div class="week-day-num">${d.getDate()}</div><div class="week-day-hours${hrs>0?' has-study':''}">${hrs>0?hrs.toFixed(1)+'h':'·'}</div>`;
    el.appendChild(div);
  }
}

function renderOverallSummary(){
  const subjs=getSubjects();let totalT=0,doneT=0,revisedT=0;
  subjs.forEach(s=>{const st=getSubjectStats(s);totalT+=st.total;doneT+=st.done;revisedT+=st.revised;});
  const pct=totalT?Math.round((doneT/totalT)*100):0;
  document.getElementById('ov-pct').textContent=pct+'%';
  let streak=0;const d=new Date();
  while(true){const k=fmtDate(d);const b=loadKey(`g27_blocks_${k}_${stream}`,Array(BLOCKS).fill(null));if(!b.some(bl=>bl?.cat&&STUDY_CATS.has(bl.cat)))break;streak++;d.setDate(d.getDate()-1);}
  const remaining=totalT-doneT;
  const avgPerDay=streak>0&&doneT>0?doneT/streak:0;
  const estDays=avgPerDay>0?Math.ceil(remaining/avgPerDay):'—';
  document.getElementById('ov-meta').innerHTML=`
    <div class="overall-meta-row"><span>${doneT}/${totalT} topics done</span><strong>${pct}%</strong></div>
    <div class="overall-meta-row"><span>Revised</span><strong>${revisedT}</strong></div>
    <div class="overall-meta-row"><span>Study streak</span><strong>${streak}d</strong></div>
    <div class="overall-meta-row"><span>Est. days left</span><strong>${estDays}</strong></div>`;
}

function renderSubjectCards(){
  document.getElementById('subject-cards').innerHTML=getSubjects().map(s=>{
    const st=getSubjectStats(s);const pct=st.total?Math.round((st.done/st.total)*100):0;
    const status=getStatus(st);const color=STATUS_COLOR[status];
    return`<div class="subject-card${s===selectedSubject?' active':''}" onclick="selectSubject('${s}')">
      <div class="subject-card-name">${s}</div>
      <div class="subject-card-bar"><div class="subject-card-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="subject-card-meta"><div class="subject-card-nums">${st.done}/${st.total} · rev ${st.revised}</div><div class="status-badge status-${status}">${STATUS_LABEL[status]}</div></div>
    </div>`;
  }).join('');
}

// ── THEME ──────────────────────────────────────────────────────────────────────
function toggleTheme(){
  const light=document.documentElement.classList.toggle('light');
  document.documentElement.classList.toggle('dark',!light);
  localStorage.setItem('g27_theme',light?'light':'dark');
}
function loadTheme(){
  const t=localStorage.getItem('g27_theme');
  if(t==='light'){document.documentElement.classList.add('light');document.documentElement.classList.remove('dark');}
  else{document.documentElement.classList.add('dark');}
}

// ── EXPORT/IMPORT ──────────────────────────────────────────────────────────────
function exportData(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('g27_'));
  const obj={};keys.forEach(k=>{obj[k]=loadKey(k,null);});
  const blob=new Blob([JSON.stringify({app:'GATE2027',v:1,exported:new Date().toISOString(),data:obj},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`GATE2027_${todayStr()}.json`;a.click();
  toast('Exported');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{const o=JSON.parse(ev.target.result);const data=o.data||o;Object.keys(data).forEach(k=>{if(k.startsWith('g27_'))saveKey(k,data[k]);});renderAll();toast('Imported');}catch{toast('Import failed');}};
  reader.readAsText(file);e.target.value='';
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
let toastTimer=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800);}

// ── KEYBOARD ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const typing=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  if(e.key==='Escape'){document.getElementById('note-modal').classList.remove('open');return;}
  if(e.key==='Enter'&&document.getElementById('note-modal').classList.contains('open')){saveModal();return;}
  if(typing)return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
  if(e.key==='ArrowLeft'){prevDay();return;}if(e.key==='ArrowRight'){nextDay();return;}
  if(e.key==='t'||e.key==='T'){goToday();return;}
  if(e.key==='s'||e.key==='S'){fillSleep();return;}
  if(e.key==='x'||e.key==='X'){selectCat(null);return;}
  if(e.key==='/'){e.preventDefault();document.getElementById('search-input')?.focus();return;}
  if(/^[1-9]$/.test(e.key)){const idx=parseInt(e.key)-1;if(idx<CATEGORIES.length){selectCat(CATEGORIES[idx].id);toast(CATEGORIES[idx].label);}}
});

// ── INIT ───────────────────────────────────────────────────────────────────────
function renderAll(){updateCountdown();renderDateLabel();renderTime();renderSyllabus();renderInsights();}

window.addEventListener('DOMContentLoaded',()=>{
  loadTheme();renderAll();
  document.getElementById('note-modal').addEventListener('click',e=>{if(e.target.id==='note-modal')closeModal();});
});
</script>
